<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container{
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 500px;
        }

        h1{
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        th{
            background-color: #007BFF;
            color: white;
            padding: 12px;
        }

        td{
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even){
            background-color: #f2f2f2;
        }

        tr:hover{
            background-color: #dbeafe;
            transition: 0.3s;
        }

        table{
            border-radius: 5px;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>User List</h1>

        <table>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>

            {% for user in data %}
            <tr>
                <td>{{ user.name }}</td>
                <td>{{ user.age }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</body>
</html>
